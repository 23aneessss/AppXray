name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          sw_vers

      - name: Build (debug)
        run: swift build

      - name: Test
        run: swift test

      - name: Build CLI (release)
        run: swift build -c release

      - name: Smoke test the CLI
        run: |
          .build/release/appxray --version
          # Exit code 3 ("a high-risk flag was found") is a valid, expected
          # outcome here — it is not a failure of the tool.
          .build/release/appxray /System/Applications/Calculator.app --json > /dev/null
          status=$?
          if [ $status -ne 0 ] && [ $status -ne 3 ]; then
            echo "appxray failed with unexpected exit code $status"
            exit 1
          fi
          echo "Smoke test OK (exit $status)"
